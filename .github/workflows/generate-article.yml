name: 毎日記事自動生成（1日3本）

on:
  schedule:
    # 毎日 09:00 / 13:00 / 18:00 JST (UTC 0:00 / 4:00 / 9:00)
    - cron: "0 0 * * *"
    - cron: "0 4 * * *"
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Validate site config
        run: npx tsx scripts/validate-config.ts

      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx scripts/generate-article.ts

      - name: Notify Google (Indexing API)
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: npx tsx scripts/ping-google.ts
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add content/articles/
          if git diff --staged --quiet; then
            echo "No new articles to commit"
          else
            git commit -m "記事を自動生成 $(date +%Y-%m-%d-%H%M)"
            git push
          fi
